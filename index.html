<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Jaroslava Forro | Fotografia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=16">
</head>

<body>
<header>
<h1>Jaroslava Forro</h1>
<p>Portrét a životný štýl</p>
<nav>
<a href="index.html">Domov</a>
<a href="#gallery">Galéria</a>
<a href="#reviews">Recenzie</a>
<a href="#contact">Kontakt</a>
<a href="admin.html">Správa</a>
</nav>
</header>

<main>
<section id="gallery" class="container section">
<div class="section-heading">
<span class="section-eyebrow">Portfólio</span>
<h2 class="page-title">Galéria</h2>
</div>
<div id="galleryGrid" class="gallery"></div>
</section>

<section id="reviews" class="container section">
<div class="section-heading">
<span class="section-eyebrow">Pochvalné slová</span>
<h2 class="page-title">Recenzie</h2>
</div>

<section class="card">
<h2>Napíšte recenziu</h2>
<form id="publicReviewForm">
<input id="name" placeholder="Vaše meno" required>
<select id="rating">
<option value="★★★★★">★★★★★</option>
<option value="★★★★☆">★★★★☆</option>
<option value="★★★☆☆">★★★☆☆</option>
<option value="★★☆☆☆">★★☆☆☆</option>
<option value="★☆☆☆☆">★☆☆☆☆</option>
</select>
<textarea id="message" placeholder="Napíšte svoju recenziu..." required></textarea>
<button type="submit">Odoslať recenziu</button>
</form>
</section>

<div id="reviewsList" class="reviews-grid"></div>
</section>

<section id="contact" class="container section contact">
<div class="section-heading">
<span class="section-eyebrow">Kontaktujte ma</span>
<h2 class="page-title">Kontakt</h2>
</div>
<div id="contactInfo" class="contact-info">
<p>Načítavajú sa kontaktné údaje...</p>
</div>
</section>
</main>

<div id="lightbox" class="lightbox">
<button class="close" type="button" onclick="closeImage()" aria-label="Zavrieť">×</button>
<img id="lightboxImage" alt="Vybraná fotografia z galérie">
</div>

<footer>
© 2026 Jaroslava Forro
</footer>

<script src="js/config.js?v=16"></script>
<script src="js/script.js?v=16"></script>
<script>
displayGallery();
displayPublicReviews();
displayContact();

document.getElementById("publicReviewForm").addEventListener("submit", function (event) {
  submitPublicReview(event);
});
</script>
</body>
</html>
