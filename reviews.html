<section class="card">

<input id="name" placeholder="Vaše meno" required>
<select id="rating">
<option value="★★★★★">★★★★★</option>
<option value="★★★★☆">★★★★☆</option>
<option value="★★★☆☆">★★★☆☆</option>
<option value="★★☆☆☆">★★☆☆☆</option>
<option value="★☆☆☆☆">★☆☆☆☆</option>
</select>
<textarea id="message" placeholder="Napíšte svoju recenziu..." required></textarea>
<button type="submit">Odoslať recenziu</button>
</form>
</section>

<div id="reviewsList" class="reviews-grid"></div>
</main>

<script src="js/config.js?v=20"></script>
<script src="js/script.js?v=20"></script>

});
